services:

  # ─── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: twj_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - twj_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Web App ─────────────────────────────────────────────────────────────────
  web:
    build: .
    container_name: twj_web
    restart: unless-stopped
    ports:
      - "7777:7777"
    env_file:
      - .env
    volumes:
      - ./static/uploads:/app/static/uploads
    networks:
      - twj_internal
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 7777"

  # ─── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: twj_redis
    restart: unless-stopped
    networks:
      - twj_internal

  # ─── Celery Worker ───────────────────────────────────────────────────────────
  celery_worker:
    build: .
    container_name: twj_celery_worker
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./static/uploads:/app/static/uploads
    networks:
      - twj_internal
    depends_on:
      db:
        condition: service_healthy
    command: celery -A app.tasks.celery_app:celery worker --loglevel=info --concurrency=2

  # ─── Celery Beat (Scheduler) ─────────────────────────────────────────────────
  celery_beat:
    build: .
    container_name: twj_celery_beat
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - twj_internal
    depends_on:
      db:
        condition: service_healthy
    command: celery -A app.tasks.celery_app:celery beat --loglevel=info

networks:
  twj_internal:
    driver: bridge

volumes:
  postgres_data:
